groups:
  - name: api_alerts
    rules:
      - alert: HighErrorRate
        expr: sum(rate(example_app_errors_total[5m])) / sum(rate(example_app_requests_total[5m])) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes (current value: {{ $value | humanizePercentage }})"

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(example_app_request_duration_seconds_bucket[5m])) by (le, endpoint)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is above 1s for endpoint {{ $labels.endpoint }} (current value: {{ $value }}s)"

      - alert: HighActiveRequests
        expr: sum(example_app_active_requests) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High number of active requests"
          description: "Number of active requests is above 100 (current value: {{ $value }})"

  - name: system_alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for the last 5 minutes on {{ $labels.instance }} (current value: {{ $value | humanizePercentage }})"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% for the last 5 minutes on {{ $labels.instance }} (current value: {{ $value | humanizePercentage }})"

      - alert: DiskSpaceFilling
        expr: 100 - ((node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space filling up"
          description: "Disk usage is above 85% for the last 5 minutes on {{ $labels.instance }} (current value: {{ $value | humanizePercentage }})"

  - name: service_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute"

      - alert: KafkaLag
        expr: kafka_consumergroup_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer group lag is high"
          description: "Kafka consumer group {{ $labels.consumergroup }} for topic {{ $labels.topic }} has a lag of {{ $value }} messages"

      - alert: QdrantHighQueryTime
        expr: histogram_quantile(0.95, sum(rate(qdrant_query_time_seconds_bucket[5m])) by (le)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Qdrant query time is high"
          description: "95th percentile Qdrant query time is above 0.5s (current value: {{ $value }}s)"

  - name: ai_agent_alerts
    rules:
      - alert: HighLLMLatency
        expr: histogram_quantile(0.95, sum(rate(ai_agent_llm_request_duration_seconds_bucket[5m])) by (le, model)) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High LLM latency detected"
          description: "95th percentile LLM latency is above 5s for model {{ $labels.model }} (current value: {{ $value }}s)"

      - alert: HighLLMErrorRate
        expr: sum(rate(ai_agent_llm_errors_total[5m])) / sum(rate(ai_agent_llm_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High LLM error rate detected"
          description: "LLM error rate is above 5% for the last 5 minutes (current value: {{ $value | humanizePercentage }})"

      - alert: KnowledgeBaseRefreshFailure
        expr: ai_agent_knowledge_base_refresh_failures_total > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Knowledge base refresh failures detected"
          description: "Knowledge base refresh has failed {{ $value }} times in the last hour"
