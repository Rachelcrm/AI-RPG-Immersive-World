# Prometheus configuration file
# See https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval: 15s     # Set the scrape interval to every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds
  scrape_timeout: 10s      # Timeout for scrape requests

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # # Scrape the API service
  # - job_name: 'api-service'
  #   metrics_path: '/metrics'
  #   scrape_interval: 10s
  #   static_configs:
  #     - targets: ['api:8000']
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       regex: '(.*)'
  #       replacement: '$1'

  # # Scrape the AI agent service
  # - job_name: 'ai-agent-service'
  #   metrics_path: '/metrics'
  #   scrape_interval: 10s
  #   static_configs:
  #     - targets: ['ai-agents:8001']
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       regex: '(.*)'
  #       replacement: '$1'

  # Scrape the example web application (running on host machine)
  - job_name: 'example-web-app'
    metrics_path: '/metrics'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8002']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.*)'
        replacement: '$1'

  # Scrape Node Exporter for host metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Scrape Kafka metrics
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Scrape Qdrant metrics
  - job_name: 'qdrant'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['qdrant:6333']
