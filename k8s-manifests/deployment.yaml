apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-monitoring-agent
  labels:
    app: ai-monitoring-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-monitoring-agent
  template:
    metadata:
      labels:
        app: ai-monitoring-agent
    spec:
      containers:
      - name: ai-monitoring-agent
        image: ai-monitoring:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: ai-monitoring-config
        - secretRef:
            name: ai-monitoring-secrets
        volumeMounts:
        - name: knowledge-volume
          mountPath: /app/knowledge
      volumes:
      - name: knowledge-volume
        emptyDir: {}
